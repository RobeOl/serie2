<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>From Interval Matrix to Score: A Generative Compositional Framework</title>

<script src="https://unpkg.com/tone"></script>
<script src="https://unpkg.com/@tonejs/midi"></script>
<script src="https://unpkg.com/soundfont-player/dist/soundfont-player.js"></script>
<script src="https://cdn.jsdelivr.net/npm/opensheetmusicdisplay/build/opensheetmusicdisplay.min.js"></script>

<style>

body{
    font-family:Arial;
    background:#f4f6f8;


<div id="serverStatus" style="
        position:fixed;
        top:0;
        left:0;
        width:100%;
        background:#3498db;
        text-align:center;
        padding:10px;
        z-index:9999;
        font-weight:bold;
        ">
        🚀 The server is starting... please wait a few seconds
        </div>
}

.container{
    width:1200px;
    margin:30px auto;
    background:white;
    padding:25px;
    border-radius:10px;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#3498db;
    color:white;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

/* Play + Stop affiancati */
.button-row{
    display:flex;
    gap:10px;
}

.button-row button{
    flex:1;
}

.reset-row{
    display:flex;
    justify-content:center; /* centra il gruppo */
    align-items:center;
    gap:10px;
    margin-top:15px;
}

.reset-btn,
.refresh-btn{
    width:140px;          /* stessa dimensione */
    padding:10px;
    border:none;
    border-radius:8px;
    color:white;
    cursor:pointer;
}

/* Reset rosso */
.reset-btn{
    background-color:#e74c3c;
}

.reset-btn:hover{
    background-color:#c0392b;
}

/* Refresh verde */
.refresh-btn{
    background-color:#2ecc71;
    display:none; /* nascosto di default */
}

.refresh-btn:hover{
    background-color:#27ae60;
}

#score{
    margin-top:30px;
    border:1px solid #ccc;
    padding:10px;
}

</style>
</head>

<body>

<!-- 🎚 BPM CONTROL -->
<div id="bpmControl" style="
    position:fixed;
    top:40px;
    right:60px;
    background:white;
    padding:10px 15px;
    border-radius:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.2);
    z-index:10000;
">
    <label><b>BPM:</b> <span id="bpmValue">100</span></label><br>
    <input type="range" id="bpmSlider" min="60" max="240" value="100">
</div>

<div class="container">

<h2>Generative Compositional Tool</h2>

<label>Start Note</label>
<select id="startNote">
<option value="0">C</option>
<option value="1">C#</option>
<option value="2">D</option>
<option value="3">Eb</option>
<option value="4">E</option>
<option value="5">F</option>
<option value="6">F#</option>
<option value="7">G</option>
<option value="8">Ab</option>
<option value="9">A</option>
<option value="10">Bb</option>
<option value="11">B</option>
</select>

<br><br>

<label>Sequence</label>
<select id="sequenceType">
<option value="Binary" selected>Binary</option>
<option value="Quaternary">Quaternary</option>
</select>

<div id="binaryParams">
Interval <input id="interval" type="number" value="3">
Leap <input id="leap" type="number" value="-1">
</div>

<div id="quaternaryParams" style="display:none;">
Interval1 <input id="interval1" type="number" value="3">
Leap1 <input id="leap1" type="number" value="3">
Interval2 <input id="interval2" type="number" value="6">
Leap2 <input id="leap2" type="number" value="-2">
</div>

<br>

<label>Tempo</label>
<select id="tempo">
<option value="sequence-constrained" selected>sequence-constrained</option>
<option value="length-constrained">length-constrained</option>
<option value="constant">constant</option>
<option value="free">free</option>
</select>

<div id="constantOptions" style="display:none;">
<label>Note Length</label>
<select id="noteLength">
<option value="4">Whole (4 beats)</option>
<option value="2">Half (2 beats)</option>
<option value="1">Quarter (1 beat)</option>
<option value="0.5">Eighth (1/2 beat)</option>
<option value="0.25">Sixteenth (1/4 beat)</option>
</select>
</div>

<br><br>

<label>
<input type="checkbox" id="octave">
Octaves
<span id="octaveLabel" style="margin-left:10px; color:#555;">
(2 octaves)
</span>
</label>

<br>

<label>
<input type="checkbox" id="harmony"> Harmony
</label>

<label style="margin-left:20px;">
    <input type="checkbox" id="bassClef">
    Bass clef
    </label>

<span id="harmonyWarning" style="
    margin-left:10px;
    color:#e67e22;
    font-style:italic;
    display:none;
">
    To be implemented
</span>

<div id="harmonyOptions" style="display:none; margin-top:10px;">
    <label>Harmony Type</label>
    <select id="harmonyType">
        <option value="classic">Classic</option>
        <option value="onbeat">On the beat</option>
        <option value="offbeat">Off the beat</option>
    </select>
</div>



<button onclick="generateMusic()">Generate</button>

<div class="button-row">
<button onclick="playMusic()">Play</button>
<button onclick="stopMusic()">Stop</button>
<button onclick="downloadMidi()">Download MIDI</button>
</div>


<div class="reset-row">
    <button class="reset-btn" onclick="resetApp()">Reset</button>

    <button id="refreshHarmonyBtn" class="refresh-btn">
        Refresh
    </button>
</div>

<br>
<label style="font-style: italic; display: block; text-align: right;">
    R. Olmi & M. Bittelli
  </label>

<div id="score"></div>

</div>

<script>

let midiData
let part
let synth
let osmd = new opensheetmusicdisplay.OpenSheetMusicDisplay(document.getElementById("score"))
let midiBlobGlobal

osmd.setOptions({
    drawPartNames: false,
    drawPartAbbreviations: false
})

/* 🎚 BPM CONTROL */
const bpmSlider = document.getElementById("bpmSlider")
const bpmValue = document.getElementById("bpmValue")

bpmSlider.addEventListener("input", function(){
    bpmValue.textContent = this.value
})

document.getElementById("octave").addEventListener("change", function() {
    const label = document.getElementById("octaveLabel")
    label.textContent = this.checked ? "(1 octave)" : "(2 octaves)"
})


document.getElementById("sequenceType").addEventListener("change", function(){
    const type = this.value
    document.getElementById("binaryParams").style.display = type === "Binary" ? "block" : "none"
    document.getElementById("quaternaryParams").style.display = type === "Quaternary" ? "block" : "none"
})

document.getElementById("refreshHarmonyBtn").addEventListener("click", refreshHarmony)

function getParams(){
    const sequenceType = document.getElementById("sequenceType").value

    let params = {}

    if(sequenceType === "Binary"){
        params.interval = parseInt(interval.value)
        params.leap = parseInt(leap.value)
    } else {
        params.interval1 = parseInt(interval1.value)
        params.leap1 = parseInt(leap1.value)
        params.interval2 = parseInt(interval2.value)
        params.leap2 = parseInt(leap2.value)
    }

    return {
        start_note: parseInt(startNote.value),
        sequence_type: sequenceType,
        tempo: tempo.value,
        harmony: harmony.checked,
        harmony_type: harmony.checked ? harmonyType.value : null,
        note_length: parseFloat(noteLength.value),
        octave: document.getElementById("octave").checked ? 1 : 2,
        bass_clef: document.getElementById("bassClef").checked,
        bpm: parseInt(bpmSlider.value), // ✅ BPM
        ...params
    }
}

// function resetApp(){
//     location.reload()
// }

// function resetApp(){
//     document.getElementById("octave").checked = false
//     document.getElementById("harmony").checked = false

//     // reset UI collegata
//     document.getElementById("octaveLabel").textContent = "(2 octaves)"
//     document.getElementById("harmonyOptions").style.display = "none"
//     document.getElementById("harmonyWarning").style.display = "none"
//     document.getElementById("bassClef").checked = false

//     location.reload()
// }

function resetApp(){
    // valori principali richiesti
    document.getElementById("sequenceType").value = "Binary"
    document.getElementById("tempo").value = "sequence-constrained"
    document.getElementById("startNote").value = "0" // C

    // trigger UI collegata
    document.getElementById("sequenceType").dispatchEvent(new Event("change"))
    document.getElementById("tempo").dispatchEvent(new Event("change"))

    // reset checkbox
    document.getElementById("octave").checked = false
    document.getElementById("harmony").checked = false
    document.getElementById("bassClef").checked = false

    // reset label/UI
    document.getElementById("octaveLabel").textContent = "(2 octaves)"
    document.getElementById("harmonyOptions").style.display = "none"
    document.getElementById("harmonyWarning").style.display = "none"

    // opzionale: reset BPM
    document.getElementById("bpmSlider").value = 100
    document.getElementById("bpmValue").textContent = "100"
}

document.getElementById("tempo").addEventListener("change", function(){
    document.getElementById("constantOptions").style.display =
        this.value === "constant" ? "block" : "none"
})

// document.getElementById("harmony").addEventListener("change", function() {
//     document.getElementById("harmonyOptions").style.display =
//         this.checked ? "block" : "none"
// })

function updateHarmonyUI() {
    const harmonyChecked = document.getElementById("harmony").checked
    const sequenceType = document.getElementById("sequenceType").value
    const tempo = document.getElementById("tempo").value

    const warning = document.getElementById("harmonyWarning")
    const options = document.getElementById("harmonyOptions")
    const refreshBtn = document.getElementById("refreshHarmonyBtn")


    // reset base
    warning.style.display = "none"
    options.style.display = "none"
    refreshBtn.style.display = "none"

    if (!harmonyChecked) return

    // ✅ CASO CONSENTITO
    if (sequenceType === "Quaternary" && tempo === "sequence-constrained") {
        options.style.display = "block"
        refreshBtn.style.display = "inline-block" // 👈 mostra bottone
    } 
    // ❌ CASI NON ANCORA IMPLEMENTATI
    else {
        warning.style.display = "inline"
    }
}

document.getElementById("harmony").addEventListener("change", updateHarmonyUI)
document.getElementById("sequenceType").addEventListener("change", updateHarmonyUI)
document.getElementById("tempo").addEventListener("change", updateHarmonyUI)

let serverAwake = false;

async function checkServer() {
    try {
        const res = await fetch("https://serie1.onrender.com/health");

        if (res.ok) {
            serverAwake = true;
            document.getElementById("serverStatus").style.display = "none";
        } else {
            retryCheck();
        }

    } catch (e) {
        retryCheck();
    }
}

function retryCheck() {
    setTimeout(checkServer, 3000); // retry ogni 3s
}

checkServer();

async function generateMusic(){

    if(!serverAwake){
        alert("⏳ The server is still starting up");
        return;
    }

    const params = getParams()

    const midiRes = await fetch("https://serie1.onrender.com/generate", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(params)
    })

    const midiBlob = await midiRes.blob()
    midiBlobGlobal = midiBlob
    const midiBuffer = await midiBlob.arrayBuffer()
    midiData = new Midi(midiBuffer)

    const scoreRes = await fetch("https://serie1.onrender.com/score", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(params)
    })

    const scoreBlob = await scoreRes.blob()
    const scoreUrl = URL.createObjectURL(scoreBlob)

    await osmd.load(scoreUrl)
    osmd.render()
}

async function playMusic(){

    if(!midiData) return

    await Tone.start()
    Tone.Transport.stop()
    Tone.Transport.cancel()

    // 🔊 sincronizza BPM con slider
    // Tone.Transport.bpm.value = parseInt(bpmSlider.value)

    const context = Tone.getContext().rawContext

    synth = await Soundfont.instrument(context, "acoustic_grand_piano")

    let events = []

    // aggiunti
    const baseBPM = 120  // BPM di riferimento del MIDI
    const currentBPM = parseInt(bpmSlider.value)
    const scale = baseBPM / currentBPM 
    // ---------
    midiData.tracks.forEach(track => {
        track.notes.forEach(note => {
            events.push({
                //time: note.time,
                time: note.time * scale,
                note: note.name,
                //duration: note.duration,
                duration: note.duration * scale,
                velocity: note.velocity
            })
        })
    })

    part = new Tone.Part((time, value)=>{
        synth.play(value.note, time, {
            duration: value.duration,
            gain: value.velocity
        })
    }, events)

    part.start(0)
    Tone.Transport.start()

    // re-render spartito aggiornato
    // osmd.render()
}

function stopMusic(){
    Tone.Transport.stop()
    if(part) part.stop()
}

function downloadMidi(){
    if(!midiBlobGlobal){
        alert("Generate MIDI first!")
        return
    }

    const url = URL.createObjectURL(midiBlobGlobal)

    const a = document.createElement("a")
    a.href = url
    a.download = "generated_music.mid"
    document.body.appendChild(a)
    a.click()

    document.body.removeChild(a)
    URL.revokeObjectURL(url)
}

async function refreshHarmony(){

if(!serverAwake){
    alert("⏳ The server is still starting up");
    return;
}

const params = getParams()

// 👇 flag per dire al backend: NON rigenerare melodia
params.refresh_harmony_only = true

const midiRes = await fetch("https://serie1.onrender.com/generate", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(params)
})

const midiBlob = await midiRes.blob()
midiBlobGlobal = midiBlob
const midiBuffer = await midiBlob.arrayBuffer()
midiData = new Midi(midiBuffer)

const scoreRes = await fetch("https://serie1.onrender.com/score", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(params)
})

const scoreBlob = await scoreRes.blob()
const scoreUrl = URL.createObjectURL(scoreBlob)

await osmd.load(scoreUrl)
osmd.render()

// 👇 nasconde il bottone dopo il click
document.getElementById("refreshHarmonyBtn").style.display = "none"
// 👇 toglie la spunta a Harmony
document.getElementById("harmony").checked = false
// 👇 aggiorna UI (warning, options, ecc.)
updateHarmonyUI()
}

</script>

</body>
</html>
