<script>

let midiData
let part
let synth
let osmd = new opensheetmusicdisplay.OpenSheetMusicDisplay(document.getElementById("score"))
let midiBlobGlobal
let inversionActive = false

const loadingOverlay = document.getElementById("loadingOverlay");

osmd.setOptions({
    drawPartNames: false,
    drawPartAbbreviations: false
})

// popolamento select trasposizione
const transposeSelect = document.getElementById("transposeValue")

for(let i = -11; i <= 11; i++){
    const opt = document.createElement("option")
    opt.value = i
    opt.textContent = i
    transposeSelect.appendChild(opt)
    transposeSelect.value = "0"
}

transposeSelect.addEventListener("change", () => {
    const value = parseInt(transposeSelect.value)

    sendTransform({
        operation: "T",
        value: value
    })
    document.getElementById("transposeControl").style.display = "none"
})



/* 🎚 BPM CONTROL */
const bpmSlider = document.getElementById("bpmSlider")
const bpmValue = document.getElementById("bpmValue")

bpmSlider.addEventListener("input", function(){
    bpmValue.textContent = this.value
})

document.getElementById("octave").addEventListener("change", function() {
    const label = document.getElementById("octaveLabel")
    label.textContent = this.checked ? "(1 octave)" : "(2 octaves)"
})


document.getElementById("sequenceType").addEventListener("change", function(){
    const type = this.value
    document.getElementById("binaryParams").style.display = type === "Binary" ? "block" : "none"
    document.getElementById("quaternaryParams").style.display = type === "Quaternary" ? "block" : "none"
    document.getElementById("senaryParams").style.display = type === "Senary" ? "block" : "none"
    document.getElementById("sequenceImage").src = 
        type === "Binary" ? "Binary.png" : 
        type === "Quaternary" ? "Quaternary.png" : 
        "Senary.png";
})

function showLoading(){
    document.getElementById("loadingOverlay").style.display = "flex";
}

function hideLoading(){
    document.getElementById("loadingOverlay").style.display = "none";
}

function getParams(){
    const sequenceType = document.getElementById("sequenceType").value

    let params = {}

    if(sequenceType === "Binary"){
        params.interval = parseInt(document.getElementById("interval").value)
        params.leap     = parseInt(document.getElementById("leap").value)
    } else if (sequenceType === "Quaternary") {
        params.interval1 = parseInt(document.getElementById("interval1").value)
        params.leap1     = parseInt(document.getElementById("leap1").value)
        params.interval2 = parseInt(document.getElementById("interval2").value)
        params.leap2     = parseInt(document.getElementById("leap2").value)
    } else {
        params.int1 = parseInt(document.getElementById("int1").value)
        params.lea1 = parseInt(document.getElementById("lea1").value)
        params.int2 = parseInt(document.getElementById("int2").value)
        params.lea2 = parseInt(document.getElementById("lea2").value)
        params.int3 = parseInt(document.getElementById("int3").value)
        params.lea3 = parseInt(document.getElementById("lea3").value)
        }

    return {
        start_note: parseInt(startNote.value),
        sequence_type: sequenceType,
        tempo: tempo.value,
        harmony: harmony.checked,
        harmony_type: harmony.checked ? harmonyType.value : null,
        note_length: parseFloat(noteLength.value),
        octave: document.getElementById("octave").checked ? 1 : 2,
        bass_clef: document.getElementById("bassClef").checked,
        bpm: parseInt(bpmSlider.value), // ✅ BPM
        ...params
    }
}


function resetApp(){
    // valori principali richiesti
    document.getElementById("sequenceType").value = "Binary"
    document.getElementById("tempo").value = "sequence-constrained"
    document.getElementById("startNote").value = "0" // C

    // trigger UI collegata
    document.getElementById("sequenceType").dispatchEvent(new Event("change"))
    document.getElementById("tempo").dispatchEvent(new Event("change"))

    // reset checkbox
    document.getElementById("octave").checked = false
    document.getElementById("harmony").checked = false
    document.getElementById("bassClef").checked = false

    // reset label/UI
    document.getElementById("octaveLabel").textContent = "(2 octaves)"
    document.getElementById("harmonyOptions").style.display = "none"
    document.getElementById("harmonyWarning").style.display = "none"

    // opzionale: reset BPM
    document.getElementById("bpmSlider").value = 100
    document.getElementById("bpmValue").textContent = "100"

    location.reload()
}

document.getElementById("tempo").addEventListener("change", function(){
    document.getElementById("constantOptions").style.display =
        this.value === "constant" ? "block" : "none"
})

function updateHarmonyUI() {
    const harmonyChecked = document.getElementById("harmony").checked
    const sequenceType = document.getElementById("sequenceType").value
    const tempo = document.getElementById("tempo").value

    const warning = document.getElementById("harmonyWarning")
    const options = document.getElementById("harmonyOptions")

    // reset base
    warning.style.display = "none"
    options.style.display = "none"

    if (!harmonyChecked) return

    // ✅ CASO CONSENTITO
    // if (sequenceType === "Quaternary" && (tempo === "sequence-constrained" || tempo == "constant")) {
    if (tempo === "sequence-constrained" || tempo == "constant") {
        options.style.display = "block"
    } 
    // ❌ CASI NON ANCORA IMPLEMENTATI
    else {
        warning.style.display = "inline"
    }
}

document.getElementById("harmony").addEventListener("change", updateHarmonyUI)
document.getElementById("sequenceType").addEventListener("change", updateHarmonyUI)
document.getElementById("tempo").addEventListener("change", updateHarmonyUI)

let serverAwake = false;

async function checkServer() {
    try {
        const res = await fetch("https://serie2.onrender.com/health");

        if (res.ok) {
            serverAwake = true;
            document.getElementById("serverStatus").style.display = "none";
        } else {
            retryCheck();
        }

    } catch (e) {
        retryCheck();
    }
}

function retryCheck() {
    setTimeout(checkServer, 3000); // retry ogni 3s
}

checkServer();


async function generateMusic(){

if(!serverAwake){
    alert("⏳ The server is still starting up");
    return;
}

showLoading(); // 👈 AGGIUNTO
loadingOverlay.innerText = "⏳ Generating MIDI..."; // 👈 QUI

try {

    const params = getParams()

    const midiRes = await fetch("https://serie2.onrender.com/generate", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(params)
    })

    const midiBlob = await midiRes.blob()
    midiBlobGlobal = midiBlob
    const midiBuffer = await midiBlob.arrayBuffer()
    midiData = new Midi(midiBuffer)

    const scoreRes = await fetch("https://serie2.onrender.com/score", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(params)
    })

    const scoreBlob = await scoreRes.blob()
    const scoreUrl = URL.createObjectURL(scoreBlob)

    loadingOverlay.innerText = "🖊 Rendering notation..."; // 👈 QUI

    await osmd.load(scoreUrl)
    osmd.render()

    // Rimuove lo spazio vuoto superiore generato da OSMD
    const svg = document.querySelector("#score svg")
    if (svg) {
        const bbox = svg.getBBox()
        const offsetY = bbox.y
        svg.style.marginTop = `-${Math.max(0, offsetY - 20)}px`
    }

} catch (err) {
    console.error(err);
    alert("Errore durante la generazione");
} finally {
    hideLoading(); // 👈 SEMPRE eseguito
}
}

function toggleInversion(){
    inversionActive = !inversionActive
    generateMusic()
}

function highlightButton(type){
    document.querySelectorAll(".button-row button")
        .forEach(b => b.style.background = "#3498db")

    event.target.style.background = "#9b59b6"
}


async function sendTransform(payload){

    showLoading();
    loadingOverlay.innerText = "🔄 Applying transformation..."; // 👈 QUI

    try {

        const midiRes = await fetch("https://serie2.onrender.com/transform", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify(payload)
        })

        const midiBlob = await midiRes.blob()
        midiBlobGlobal = midiBlob

        const midiBuffer = await midiBlob.arrayBuffer()
        midiData = new Midi(midiBuffer)

        const scoreRes = await fetch("https://serie2.onrender.com/score", {
            method: "POST"
        })

        const scoreBlob = await scoreRes.blob()
        const scoreUrl = URL.createObjectURL(scoreBlob)

        loadingOverlay.innerText = "🖊 Rendering notation..."; // 👈 QUI

        await osmd.load(scoreUrl)
        osmd.render()

        // Rimuove lo spazio vuoto superiore generato da OSMD
        const svg = document.querySelector("#score svg")
        if (svg) {
            const bbox = svg.getBBox()
            const offsetY = bbox.y
            svg.style.marginTop = `-${Math.max(0, offsetY - 20)}px`
        }

    } finally {
        hideLoading();
    }
}

async function transform(type){
    if(!midiData){
        alert("Generate music first!")
        return
    }

    let payload = { operation: type }

    // se è trasposizione, aggiungi valore
    if(type === "T"){
        document.getElementById("transposeControl").style.display = "block"
        return
    }

    sendTransform(payload)
}


async function rythm_transform(type){
    if(!midiData){
        alert("Generate music first!")
        return
    }

    let payload = { operation: type }

    sendTransform(payload)
}

async function playMusic(){

    if(!midiData) return

    await Tone.start()
    Tone.Transport.stop()
    Tone.Transport.cancel()

    // 🔊 sincronizza BPM con slider
    // Tone.Transport.bpm.value = parseInt(bpmSlider.value)

    const context = Tone.getContext().rawContext

    synth = await Soundfont.instrument(context, "acoustic_grand_piano")

    let events = []

    // aggiunti
    const baseBPM = 120  // BPM di riferimento del MIDI
    const currentBPM = parseInt(bpmSlider.value)
    const scale = baseBPM / currentBPM 
    // ---------
    midiData.tracks.forEach(track => {
        track.notes.forEach(note => {
            events.push({
                //time: note.time,
                time: note.time * scale,
                note: note.name,
                //duration: note.duration,
                duration: note.duration * scale,
                velocity: note.velocity
            })
        })
    })

    part = new Tone.Part((time, value)=>{
        synth.play(value.note, time, {
            duration: value.duration,
            gain: value.velocity
        })
    }, events)

    part.start(0)
    Tone.Transport.start()
}

function stopMusic(){
    Tone.Transport.stop()
    if(part) part.stop()
}

function downloadMidi(){
    if(!midiBlobGlobal){
        alert("Generate MIDI first!")
        return
    }

    const url = URL.createObjectURL(midiBlobGlobal)

    const a = document.createElement("a")
    a.href = url
    a.download = "generated_music.mid"
    document.body.appendChild(a)
    a.click()

    document.body.removeChild(a)
    URL.revokeObjectURL(url)
}

</script>
